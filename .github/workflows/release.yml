name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-release-batch-1:
    name: Build batch 1 (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: codex-rust/codex-rs
    strategy:
      fail-fast: false
      max-parallel: 3
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            ext: tar.gz
          - os: macos-latest
            target: x86_64-apple-darwin
            ext: tar.gz
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            ext: tar.gz
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@a0b273b48ed29de4470960879e8381ff45632f26 # 1.93.0
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: codex-rust/codex-rs
      - name: Build release
        env:
          CARGO_BUILD_JOBS: '1'
          CARGO_INCREMENTAL: '0'
        run: cargo build -p codex-cli --release --target ${{ matrix.target }} -j 1
      - name: Package
        run: |
          mkdir -p dist
          tar -C target/${{ matrix.target }}/release -czf dist/codex-${{ github.ref_name }}-${{ matrix.target }}.tar.gz codex
          ls -lh dist
      - uses: actions/upload-artifact@v7
        with:
          name: codex-${{ github.ref_name }}-${{ matrix.target }}
          path: codex-rust/codex-rs/dist/codex-${{ github.ref_name }}-${{ matrix.target }}.${{ matrix.ext }}
          if-no-files-found: error

  build-release-batch-2:
    name: Build batch 2 (${{ matrix.target }})
    needs: build-release-batch-1
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: codex-rust/codex-rs
    strategy:
      fail-fast: false
      max-parallel: 3
      matrix:
        include:
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            ext: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            ext: zip
          - os: windows-latest
            target: aarch64-pc-windows-msvc
            ext: zip
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@a0b273b48ed29de4470960879e8381ff45632f26 # 1.93.0
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: codex-rust/codex-rs
      - name: Build release
        if: matrix.target != 'aarch64-pc-windows-msvc'
        env:
          CARGO_BUILD_JOBS: '1'
          CARGO_INCREMENTAL: '0'
        run: cargo build -p codex-cli --release --target ${{ matrix.target }} -j 1
      - name: Build release (Windows ARM64)
        if: matrix.target == 'aarch64-pc-windows-msvc'
        env:
          CARGO_BUILD_JOBS: '1'
          CARGO_INCREMENTAL: '0'
          CARGO_PROFILE_RELEASE_CODEGEN_UNITS: '16'
          CARGO_PROFILE_RELEASE_LTO: 'false'
        run: cargo build -p codex-cli --release --target ${{ matrix.target }} -j 1
      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist
          tar -C target/${{ matrix.target }}/release -czf dist/codex-${{ github.ref_name }}-${{ matrix.target }}.tar.gz codex
          ls -lh dist
      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist
          Compress-Archive `
            -Path "target/${{ matrix.target }}/release/codex.exe" `
            -DestinationPath "dist/codex-${{ github.ref_name }}-${{ matrix.target }}.zip" `
            -Force
          Get-ChildItem dist
      - uses: actions/upload-artifact@v7
        with:
          name: codex-${{ github.ref_name }}-${{ matrix.target }}
          path: codex-rust/codex-rs/dist/codex-${{ github.ref_name }}-${{ matrix.target }}.${{ matrix.ext }}
          if-no-files-found: error

  create-release:
    name: Create GitHub Release
    needs: [build-release-batch-1, build-release-batch-2]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          pattern: codex-${{ github.ref_name }}-*
          merge-multiple: true
          path: artifacts
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          files: artifacts/*
          generate_release_notes: true
