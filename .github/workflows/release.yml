name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-macos:
    name: macOS
    runs-on: macos-latest
    defaults:
      run:
        working-directory: codex-rust/codex-rs
    strategy:
      matrix:
        target:
          - aarch64-apple-darwin
          - x86_64-apple-darwin
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@a0b273b48ed29de4470960879e8381ff45632f26 # 1.93.0
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: codex-rust/codex-rs
      - name: Build release
        run: cargo build -p codex-cli --release --target ${{ matrix.target }}
      - name: Package
        run: |
          mkdir -p dist
          tar -C target/${{ matrix.target }}/release -czf dist/codex-${{ github.ref_name }}-${{ matrix.target }}.tar.gz codex
          ls -lh dist
      - uses: actions/upload-artifact@v7
        with:
          name: codex-${{ github.ref_name }}-${{ matrix.target }}
          path: codex-rust/codex-rs/dist/codex-${{ github.ref_name }}-${{ matrix.target }}.tar.gz
          if-no-files-found: error

  build-linux:
    name: Linux (${{ matrix.target }})
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: codex-rust/codex-rs
    strategy:
      matrix:
        target:
          - x86_64-unknown-linux-gnu
          - aarch64-unknown-linux-gnu
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@a0b273b48ed29de4470960879e8381ff45632f26 # 1.93.0
        with:
          targets: ${{ matrix.target }}
      - name: Install cross-compilation deps (aarch64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo dpkg --add-architecture arm64
          # GitHub's ubuntu-latest doesn't have arm64 in its default mirrors.
          # Use ports.ubuntu.com for arm64 packages.
          sudo tee /etc/apt/sources.list.d/arm64-cross.list <<'SOURCES'
          deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports noble main universe restricted multiverse
          deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports noble-updates main universe restricted multiverse
          deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports noble-security main universe restricted multiverse
          SOURCES
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu libc6-dev-arm64-cross libssl-dev:arm64
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
          echo "PKG_CONFIG_ALLOW_CROSS=1" >> $GITHUB_ENV
          echo "PKG_CONFIG_PATH=/usr/lib/aarch64-linux-gnu/pkgconfig" >> $GITHUB_ENV
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: codex-rust/codex-rs
      - name: Build release
        env:
          CARGO_BUILD_JOBS: '2'
        run: cargo build -p codex-cli --release --target ${{ matrix.target }}
      - name: Package
        run: |
          mkdir -p dist
          tar -C target/${{ matrix.target }}/release -czf dist/codex-${{ github.ref_name }}-${{ matrix.target }}.tar.gz codex
          ls -lh dist
      - uses: actions/upload-artifact@v7
        with:
          name: codex-${{ github.ref_name }}-${{ matrix.target }}
          path: codex-rust/codex-rs/dist/codex-${{ github.ref_name }}-${{ matrix.target }}.tar.gz
          if-no-files-found: error

  build-windows:
    name: Windows (${{ matrix.target }})
    runs-on: windows-latest
    defaults:
      run:
        working-directory: codex-rust/codex-rs
    strategy:
      matrix:
        target:
          - x86_64-pc-windows-msvc
          - aarch64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@a0b273b48ed29de4470960879e8381ff45632f26 # 1.93.0
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: codex-rust/codex-rs
      - name: Build release
        run: cargo build -p codex-cli --release --target ${{ matrix.target }}
      - name: Package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist
          $targetDir = "target/${{ matrix.target }}/release"
          Push-Location $targetDir
          7z a ../../dist/codex-${{ github.ref_name }}-${{ matrix.target }}.zip codex.exe
          Pop-Location
          Get-ChildItem dist
      - uses: actions/upload-artifact@v7
        with:
          name: codex-${{ github.ref_name }}-${{ matrix.target }}
          path: codex-rust/codex-rs/dist/codex-${{ github.ref_name }}-${{ matrix.target }}.zip
          if-no-files-found: error

  create-release:
    name: Create GitHub Release
    needs: [build-macos, build-linux, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          pattern: codex-${{ github.ref_name }}-*
          merge-multiple: true
          path: artifacts
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          files: artifacts/*
          generate_release_notes: true
