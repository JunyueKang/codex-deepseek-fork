name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-macos:
    name: macOS
    runs-on: macos-latest
    defaults:
      run:
        working-directory: codex-rust/codex-rs
    strategy:
      matrix:
        target:
          - aarch64-apple-darwin
          - x86_64-apple-darwin
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@a0b273b48ed29de4470960879e8381ff45632f26 # 1.93.0
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: codex-rust/codex-rs
      - name: Build release
        run: cargo build -p codex-cli --release --target ${{ matrix.target }}
      - name: Package
        run: |
          mkdir -p dist
          tar -C target/${{ matrix.target }}/release -czf dist/codex-${{ github.ref_name }}-${{ matrix.target }}.tar.gz codex
          ls -lh dist
      - uses: actions/upload-artifact@v7
        with:
          name: codex-${{ github.ref_name }}-${{ matrix.target }}
          path: codex-rust/codex-rs/dist/codex-${{ github.ref_name }}-${{ matrix.target }}.tar.gz
          if-no-files-found: error

  build-linux-x86_64:
    name: Linux (x86_64-unknown-linux-gnu)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: codex-rust/codex-rs
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@a0b273b48ed29de4470960879e8381ff45632f26 # 1.93.0
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: codex-rust/codex-rs
      - name: Build release
        run: cargo build -p codex-cli --release
      - name: Package
        run: |
          mkdir -p dist
          tar -C target/release -czf dist/codex-${{ github.ref_name }}-x86_64-unknown-linux-gnu.tar.gz codex
          ls -lh dist
      - uses: actions/upload-artifact@v7
        with:
          name: codex-${{ github.ref_name }}-x86_64-unknown-linux-gnu
          path: codex-rust/codex-rs/dist/codex-${{ github.ref_name }}-x86_64-unknown-linux-gnu.tar.gz
          if-no-files-found: error

  build-linux-aarch64:
    name: Linux (aarch64-unknown-linux-gnu)
    runs-on: ubuntu-24.04-arm
    defaults:
      run:
        working-directory: codex-rust/codex-rs
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@a0b273b48ed29de4470960879e8381ff45632f26 # 1.93.0
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: codex-rust/codex-rs
      - name: Build release
        env:
          CARGO_BUILD_JOBS: '1'
          CARGO_INCREMENTAL: '0'
        run: cargo build -p codex-cli --release -j 1
      - name: Package
        run: |
          mkdir -p dist
          tar -C target/release -czf dist/codex-${{ github.ref_name }}-aarch64-unknown-linux-gnu.tar.gz codex
          ls -lh dist
      - uses: actions/upload-artifact@v7
        with:
          name: codex-${{ github.ref_name }}-aarch64-unknown-linux-gnu
          path: codex-rust/codex-rs/dist/codex-${{ github.ref_name }}-aarch64-unknown-linux-gnu.tar.gz
          if-no-files-found: error

  build-windows:
    name: Windows (${{ matrix.target }})
    runs-on: windows-latest
    defaults:
      run:
        working-directory: codex-rust/codex-rs
    strategy:
      matrix:
        target:
          - x86_64-pc-windows-msvc
          - aarch64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@a0b273b48ed29de4470960879e8381ff45632f26 # 1.93.0
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: codex-rust/codex-rs
      - name: Build release
        run: cargo build -p codex-cli --release --target ${{ matrix.target }}
      - name: Package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist
          $targetDir = "target/${{ matrix.target }}/release"
          Push-Location $targetDir
          7z a ../../dist/codex-${{ github.ref_name }}-${{ matrix.target }}.zip codex.exe
          Pop-Location
          Get-ChildItem dist
      - uses: actions/upload-artifact@v7
        with:
          name: codex-${{ github.ref_name }}-${{ matrix.target }}
          path: codex-rust/codex-rs/dist/codex-${{ github.ref_name }}-${{ matrix.target }}.zip
          if-no-files-found: error

  create-release:
    name: Create GitHub Release
    needs: [build-macos, build-linux-x86_64, build-linux-aarch64, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          pattern: codex-${{ github.ref_name }}-*
          merge-multiple: true
          path: artifacts
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          files: artifacts/*
          generate_release_notes: true
